<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kollel Time Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(229, 231, 235, 0.5); }
        body { background-color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        .hidden { display: none !important; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
        .toast-animate { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="toastContainer" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 space-y-2 w-full max-w-xs"></div>

    <div id="loginSection" class="w-full max-w-md mt-10 p-8 glass-card rounded-2xl shadow-xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Kollel Tracker</h1>
            <p class="text-slate-500 mt-2">Enter your User ID to begin</p>
        </div>
        <div class="space-y-4">
            <input type="number" id="userIdInput" placeholder="User ID (e.g. 101)"
                   class="w-full p-4 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-lg text-center">
            <button onclick="handleLogin()" id="loginBtn"
                    class="w-full bg-slate-800 text-white p-4 rounded-xl font-bold text-lg hover:bg-slate-700 transition-all flex justify-center items-center gap-2">
                <i data-lucide="log-in"></i> Login
            </button>
        </div>
    </div>

    <div id="dashboardSection" class="w-full max-w-md space-y-6 hidden">
        <div class="flex justify-between items-center p-2">
            <div>
                <h2 class="text-xl font-bold text-slate-800">Shalom, <span id="userNameDisplay">---</span></h2>
                <p id="currentDate" class="text-sm text-slate-500"></p>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-red-500 transition-colors">
                <i data-lucide="log-out"></i>
            </button>
        </div>

        <div class="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200">
            <button onclick="switchTab('attendance')" id="tab-attendance" class="flex-1 py-2 text-sm font-medium rounded-lg bg-slate-800 text-white transition-all">Attendance</button>
            <button onclick="switchTab('manual')" id="tab-manual" class="flex-1 py-2 text-sm font-medium text-slate-500 hover:text-slate-800 transition-all">Manual</button>
            <button onclick="switchTab('reports')" id="tab-reports" class="flex-1 py-2 text-sm font-medium text-slate-500 hover:text-slate-800 transition-all">Reports</button>
        </div>

        <div id="attendanceSection" class="space-y-6">
            <div class="glass-card p-8 rounded-3xl shadow-lg text-center space-y-6 border border-slate-100">
                <div id="statusIndicator" class="inline-flex items-center gap-2 px-4 py-1 rounded-full text-sm font-medium bg-slate-100 text-slate-600">
                    <span class="w-2 h-2 rounded-full bg-slate-400"></span> Offline
                </div>
                
                <div class="text-5xl font-mono font-bold text-slate-800 py-4" id="timerDisplay">00:00:00</div>
                
                <div class="text-sm font-semibold text-slate-400 uppercase tracking-wide">
                    Today's Total: <span id="dailyTotalDisplay" class="text-slate-600">0h 0m</span>
                </div>

                <div class="flex gap-4">
                    <button id="startBtn" onclick="handleStart()" class="flex-1 bg-emerald-600 text-white p-5 rounded-2xl font-bold shadow-lg hover:bg-emerald-700 active:scale-95 transition-all">START</button>
                    <button id="endBtn" onclick="handleEnd()" disabled class="flex-1 bg-rose-600 text-white p-5 rounded-2xl font-bold shadow-lg hover:bg-rose-700 active:scale-95 transition-all disabled:opacity-30">STOP</button>
                </div>
            </div>
        </div>

        <div id="manualSection" class="hidden space-y-4">
            <div class="glass-card p-6 rounded-2xl shadow-md space-y-4 border border-slate-100">
                <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Manual Entry
                </h3>
                <div class="space-y-4 text-left">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Date</label>
                        <input type="date" id="manualDate" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Start Time</label>
                            <input type="time" id="manualStart" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">End Time</label>
                            <input type="time" id="manualEnd" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none">
                        </div>
                    </div>
                    <button onclick="submitManualEntry()" id="submitManualBtn" class="w-full bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all flex justify-center items-center gap-2">
                        <i data-lucide="check-circle"></i> Save Entry
                    </button>
                </div>
            </div>
        </div>

        <div id="reportsSection" class="hidden space-y-4">
            <div class="bg-slate-800 text-white p-6 rounded-2xl shadow-lg flex justify-between items-center">
                <div class="text-left">
                    <p class="text-slate-400 text-xs font-bold uppercase">Monthly Total</p>
                    <h3 class="text-3xl font-bold"><span id="reportTotalHours">0.00</span> <span class="text-lg font-normal opacity-60">hrs</span></h3>
                </div>
                <select id="monthPicker" onchange="loadReport()" class="bg-slate-700 text-white border-none rounded-lg p-2 text-sm"></select>
            </div>
            <div id="reportEntriesList" class="space-y-3 text-left"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpIm8v5F-r_uZSTl9Q_QzLyeDzrCEvnKNGDESem1IkBzAaGWV9Z4EPz2dJY16L8gGQ/exec";

        function apiRequestJSONP(action, payload) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_' + Math.round(Math.random() * 1000000);
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    const scriptTag = document.getElementById(callbackName);
                    if (scriptTag) document.body.removeChild(scriptTag);
                    resolve(data);
                };
                const url = `${GOOGLE_SCRIPT_URL}?callback=${callbackName}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
                const script = document.createElement('script');
                script.id = callbackName;
                script.src = url;
                script.onerror = () => reject(new Error('Connection Error'));
                document.body.appendChild(script);
            });
        }

        // --- UI HELPERS ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-600' : 'bg-rose-600';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.className = `${bgColor} text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 toast-animate`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i> <span class="font-medium">${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function formatDuration(totalMinutes) {
            const mins = parseInt(totalMinutes) || 0;
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        function formatDisplayDate(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return d.toLocaleDateString('en-GB'); 
        }

        function formatDisplayTime(timeStr) {
            if (!timeStr) return "Active";
            if (timeStr.includes('T')) {
                const d = new Date(timeStr);
                return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            }
            return timeStr;
        }

        // --- APP LOGIC ---
        lucide.createIcons();
        let currentUser = null;
        let timerInterval = null;
        let startTime = null;

        async function handleLogin() {
            const userId = document.getElementById('userIdInput').value;
            const btn = document.getElementById('loginBtn');
            if(!userId) return showToast("Please enter User ID", "error");
            
            btn.disabled = true;
            btn.innerHTML = "Checking...";

            try {
                const user = await apiRequestJSONP('getUser', { userId: userId });
                if(user && user.userName) {
                    currentUser = user;
                    showDashboard();
                    showToast(`Welcome back, ${user.userName}`);
                } else {
                    showToast("User ID not found", "error");
                    btn.disabled = false;
                    btn.innerHTML = "Login";
                }
            } catch (e) {
                showToast("Connection failed", "error");
                btn.disabled = false;
                btn.innerHTML = "Login";
            }
        }

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = currentUser.userName;
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            
            if (currentUser.dailyTotal) {
                document.getElementById('dailyTotalDisplay').innerText = formatDuration(currentUser.dailyTotal);
            }
            loadReport();
        }

        function switchTab(tabName) {
            const sections = ['attendance', 'manual', 'reports'];
            sections.forEach(s => {
                document.getElementById(s + 'Section').classList.add('hidden');
                const btn = document.getElementById('tab-' + s);
                btn.classList.remove('bg-slate-800', 'text-white');
                btn.classList.add('text-slate-500');
            });

            document.getElementById(tabName + 'Section').classList.remove('hidden');
            const activeBtn = document.getElementById('tab-' + tabName);
            activeBtn.classList.add('bg-slate-800', 'text-white');
            activeBtn.classList.remove('text-slate-500');

            if (tabName === 'manual') {
                document.getElementById('manualDate').value = new Date().toISOString().split('T')[0];
            }
            if (tabName === 'reports') loadReport();
        }

        async function handleStart() {
            setLoading(true);
            try {
                const res = await apiRequestJSONP('startSession', { userId: currentUser.userId });
                if(res.success) {
                    startTimer(new Date());
                    updateUI(true);
                    showToast("Session started");
                }
            } catch (e) { showToast("Error starting session", "error"); }
            setLoading(false);
        }

        async function handleEnd() {
            setLoading(true);
            try {
                const res = await apiRequestJSONP('endSession', { userId: currentUser.userId });
                if(res.success) {
                    clearInterval(timerInterval);
                    updateUI(false);
                    document.getElementById('timerDisplay').innerText = "00:00:00";
                    showToast(`Session saved: ${formatDuration(res.duration)}`);
                    if (res.dailyTotal) document.getElementById('dailyTotalDisplay').innerText = formatDuration(res.dailyTotal);
                    loadReport();
                }
            } catch (e) { showToast("Error saving session", "error"); }
            setLoading(false);
        }

        function startTimer(time) {
            startTime = time;
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = new Date() - startTime;
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function updateUI(isActive) {
            document.getElementById('startBtn').disabled = isActive;
            document.getElementById('endBtn').disabled = !isActive;
            const status = document.getElementById('statusIndicator');
            if(isActive) {
                status.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Active Now';
                status.className = "inline-flex items-center gap-2 px-4 py-1 rounded-full text-sm font-medium bg-emerald-50 text-emerald-600";
            } else {
                status.innerHTML = '<span class="w-2 h-2 rounded-full bg-slate-400"></span> Offline';
                status.className = "inline-flex items-center gap-2 px-4 py-1 rounded-full text-sm font-medium bg-slate-100 text-slate-600";
            }
        }

        async function submitManualEntry() {
            const dateField = document.getElementById('manualDate');
            const startField = document.getElementById('manualStart');
            const endField = document.getElementById('manualEnd');

            if (!dateField.value || !startField.value || !endField.value) {
                return showToast("Please fill all fields", "error");
            }

            const btn = document.getElementById('submitManualBtn');
            btn.disabled = true; btn.innerHTML = "Saving...";
            
            try {
                const res = await apiRequestJSONP('manualEntry', {
                    userId: currentUser.userId,
                    date: dateField.value,
                    startTime: startField.value,
                    endTime: endField.value
                });
                
                if (res.success) {
                    showToast("Entry saved successfully");
                    startField.value = ""; endField.value = "";
                    dateField.value = new Date().toISOString().split('T')[0];
                    loadReport();
                } else { showToast(res.error || "Failed to save", "error"); }
            } catch (e) { showToast("Connection error", "error"); }
            
            btn.disabled = false; btn.innerHTML = '<i data-lucide="check-circle"></i> Save Entry';
            lucide.createIcons();
        }

        async function loadReport() {
            const monthPicker = document.getElementById('monthPicker');
            if (!monthPicker.innerHTML) {
                const now = new Date();
                for (let i = 0; i < 4; i++) {
                    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    const val = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}`;
                    monthPicker.innerHTML += `<option value="${val}">${val}</option>`;
                }
            }

            const list = document.getElementById('reportEntriesList');
            list.innerHTML = '<p class="text-center text-slate-400 py-4 text-sm">Loading report...</p>';
            
            try {
                const data = await apiRequestJSONP('getUserReport', { userId: currentUser.userId, monthKey: monthPicker.value });
                document.getElementById('reportTotalHours').innerText = data.totalHours;
                
                // Grouping by Date for Daily Totals
                const grouped = data.entries.reduce((acc, entry) => {
                    const day = formatDisplayDate(entry.date);
                    if (!acc[day]) acc[day] = { total: 0, items: [] };
                    acc[day].total += (parseInt(entry.duration) || 0);
                    acc[day].items.push(entry);
                    return acc;
                }, {});

                list.innerHTML = Object.entries(grouped).map(([day, group]) => `
                    <div class="glass-card p-4 rounded-xl border border-slate-100 space-y-2">
                        <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                            <span class="font-bold text-slate-800">${day}</span>
                            <span class="text-xs font-bold text-slate-500 uppercase">Daily: ${formatDuration(group.total)}</span>
                        </div>
                        <div class="space-y-1">
                            ${group.items.map(e => `
                                <div class="flex justify-between text-xs text-slate-500">
                                    <span>${formatDisplayTime(e.start)} - ${formatDisplayTime(e.end)}</span>
                                    <span>${formatDuration(e.duration)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('') || '<p class="text-center text-slate-400 py-4 text-sm">No records found.</p>';
            } catch (error) { list.innerHTML = "Error loading report."; }
        }

        function setLoading(isLoading) {
            document.getElementById('startBtn').disabled = isLoading;
            document.getElementById('endBtn').disabled = isLoading;
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
