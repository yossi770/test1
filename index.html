<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kollel Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(229, 231, 235, 0.5); }
        body { background-color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        .hidden { display: none !important; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
        .toast-animate { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="toastContainer" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 space-y-2 w-full max-w-xs"></div>

    <div id="loginSection" class="w-full max-w-md mt-10 p-8 glass-card rounded-2xl shadow-xl">
        <div class="text-center mb-8 text-slate-800">
            <h1 class="text-3xl font-bold">Kollel Tracker</h1>
            <p class="text-slate-500 mt-2">Enter your User ID</p>
        </div>
        <input type="number" id="userIdInput" placeholder="User ID" class="w-full p-4 border rounded-xl mb-4 text-center text-lg">
        <button onclick="handleLogin()" id="loginBtn" class="w-full bg-slate-800 text-white p-4 rounded-xl font-bold flex justify-center items-center gap-2">
            <i data-lucide="log-in"></i> Login
        </button>
    </div>

    <div id="dashboardSection" class="w-full max-w-md space-y-6 hidden">
        <div class="flex justify-between items-center p-2">
            <div>
                <h2 class="text-xl font-bold text-slate-800">Shalom, <span id="userNameDisplay">---</span></h2>
                <p id="currentDate" class="text-sm text-slate-500"></p>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-red-500"><i data-lucide="log-out"></i></button>
        </div>

        <div class="flex bg-white p-1 rounded-xl shadow-sm border">
            <button onclick="switchTab('attendance')" id="tab-attendance" class="flex-1 py-2 text-sm font-medium rounded-lg bg-slate-800 text-white">Attendance</button>
            <button onclick="switchTab('manual')" id="tab-manual" class="flex-1 py-2 text-sm font-medium text-slate-500">Manual</button>
            <button onclick="switchTab('reports')" id="tab-reports" class="flex-1 py-2 text-sm font-medium text-slate-500">Reports</button>
        </div>

        <div id="attendanceSection" class="space-y-6">
            <div class="glass-card p-8 rounded-3xl shadow-lg text-center space-y-6">
                <div id="statusIndicator" class="inline-flex items-center gap-2 px-4 py-1 rounded-full text-sm font-medium bg-slate-100 text-slate-600">
                    <span class="w-2 h-2 rounded-full bg-slate-400"></span> Offline
                </div>
                <div class="text-5xl font-mono font-bold text-slate-800" id="timerDisplay">00:00:00</div>
                <div class="text-sm font-semibold text-slate-400 uppercase">Today: <span id="dailyTotalDisplay" class="text-slate-600">0m</span></div>
                <div class="flex gap-4">
                    <button id="startBtn" onclick="handleStart()" class="flex-1 bg-emerald-600 text-white p-5 rounded-2xl font-bold shadow-lg">START</button>
                    <button id="endBtn" onclick="handleEnd()" disabled class="flex-1 bg-rose-600 text-white p-5 rounded-2xl font-bold shadow-lg disabled:opacity-30">STOP</button>
                </div>
            </div>
        </div>

        <div id="manualSection" class="hidden glass-card p-6 rounded-2xl space-y-4">
            <h3 class="text-lg font-bold flex items-center gap-2"><i data-lucide="plus-circle"></i> Add Entry</h3>
            <input type="date" id="manualDate" class="w-full p-3 border rounded-xl">
            <div class="grid grid-cols-2 gap-4">
                <input type="time" id="manualStart" class="w-full p-3 border rounded-xl">
                <input type="time" id="manualEnd" class="w-full p-3 border rounded-xl">
            </div>
            <button onclick="submitManualEntry()" id="submitManualBtn" class="w-full bg-slate-800 text-white p-4 rounded-xl font-bold">Save Entry</button>
        </div>

        <div id="reportsSection" class="hidden space-y-4">
            <div class="bg-slate-800 text-white p-6 rounded-2xl shadow-lg flex justify-between items-center">
                <div>
                    <p class="text-slate-400 text-xs font-bold uppercase">Monthly Total</p>
                    <h3 class="text-3xl font-bold" id="reportTotalHours">0.00 hrs</h3>
                </div>
                <select id="monthPicker" onchange="loadReport()" class="bg-slate-700 text-white rounded-lg p-2 text-sm"></select>
            </div>
            <div id="reportEntriesList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpIm8v5F-r_uZSTl9Q_QzLyeDzrCEvnKNGDESem1IkBzAaGWV9Z4EPz2dJY16L8gGQ/exec"; // החלף בקישור שלך

        function apiRequestJSONP(action, payload) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_' + Math.round(Math.random() * 1000000);
                window[callbackName] = (data) => {
                    delete window[callbackName];
                    document.getElementById(callbackName)?.remove();
                    resolve(data);
                };
                const script = document.createElement('script');
                script.id = callbackName;
                script.src = `${GOOGLE_SCRIPT_URL}?callback=${callbackName}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
                script.onerror = () => reject(new Error('Connection failed'));
                document.body.appendChild(script);
            });
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `${type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'} text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 toast-animate`;
            toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-5 h-5"></i><span>${msg}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        function formatMins(totalMins) {
            const m = parseInt(totalMins) || 0;
            const hrs = Math.floor(m / 60);
            const mins = m % 60;
            return hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
        }

        lucide.createIcons();
        let currentUser = null;
        let timerInterval = null;

        async function handleLogin() {
            const id = document.getElementById('userIdInput').value;
            if(!id) return showToast("Enter ID", "error");
            try {
                const user = await apiRequestJSONP('getUser', { userId: id });
                if(user?.userName) {
                    currentUser = user;
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('dashboardSection').classList.remove('hidden');
                    document.getElementById('userNameDisplay').innerText = user.userName;
                    document.getElementById('dailyTotalDisplay').innerText = formatMins(user.dailyTotal);
                    loadReport();
                } else showToast("User not found", "error");
            } catch (e) { showToast("Error connecting", "error"); }
        }

        function switchTab(tab) {
            ['attendance', 'manual', 'reports'].forEach(t => {
                document.getElementById(t + 'Section').classList.add('hidden');
                document.getElementById('tab-' + t).className = "flex-1 py-2 text-sm font-medium text-slate-500";
            });
            document.getElementById(tab + 'Section').classList.remove('hidden');
            document.getElementById('tab-' + tab).className = "flex-1 py-2 text-sm font-medium rounded-lg bg-slate-800 text-white";
            if(tab === 'manual') document.getElementById('manualDate').value = new Date().toISOString().split('T')[0];
            if(tab === 'reports') loadReport();
        }

        async function submitManualEntry() {
            const btn = document.getElementById('submitManualBtn');
            const data = { 
                userId: currentUser.userId, 
                date: document.getElementById('manualDate').value,
                startTime: document.getElementById('manualStart').value,
                endTime: document.getElementById('manualEnd').value
            };
            if(!data.date || !data.startTime || !data.endTime) return showToast("Fill all fields", "error");
            
            btn.disabled = true; btn.innerText = "Saving...";
            const res = await apiRequestJSONP('manualEntry', data);
            btn.disabled = false; btn.innerText = "Save Entry";
            
            if(res?.success) {
                showToast("Saved!");
                document.getElementById('manualStart').value = "";
                document.getElementById('manualEnd').value = "";
                loadReport();
            } else showToast("Error saving", "error");
        }

        // פונקציית עזר להמרת דקות לפורמט שעות ודקות 
function formatDurationReadable(totalMinutes) {
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    if (hours > 0) return hours + "h " + minutes + "m";
    return minutes + "m";
}

function loadReport() {
    const monthPicker = document.getElementById('monthPicker');
    // ... (קוד מילוי ה-monthPicker הקיים) [cite: 59, 62]

    const monthKey = monthPicker.value;
    const listContainer = document.getElementById('reportEntriesList');
    listContainer.innerHTML = '<p class="text-center text-slate-400 py-10">טוען נתונים...</p>';

    apiRequestJSONP('getUserReport', { userId: currentUser.userId, monthKey: monthKey })
        .then(data => {
            document.getElementById('reportTotalHours').innerText = data.totalHours + " hrs";
            
            if (data.entries.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-slate-400 py-10">לא נמצאו דיווחים לחודש זה.</p>';
                return;
            }

            listContainer.innerHTML = data.entries.map(entry => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center mb-2">
                    <div>
                        <p class="font-bold text-slate-800">${entry.date}</p>
                        <p class="text-xs text-slate-500">${entry.start} - ${entry.end || 'פעיל'}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-xs font-bold">
                            ${formatDurationReadable(entry.duration)}
                        </span>
                        <button onclick="handleDelete('${entry.monthKey}', ${entry.rowIndex})" class="text-rose-500 hover:bg-rose-50 p-2 rounded-lg transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons(); // רענון האייקונים של Trash
        });
}

// פונקציה לטיפול במחיקה
async function handleDelete(monthKey, rowIndex) {
    if (!confirm("האם אתה בטוח שברצונך למחוק דיווח זה?")) return;
    
    try {
        const res = await apiRequestJSONP('deleteEntry', { monthKey: monthKey, rowIndex: rowIndex });
        if (res.success) {
            alert("הדיווח נמחק בהצלחה");
            loadReport(); // רענון הרשימה
        } else {
            alert("שגיאה במחיקה: " + res.message);
        }
    } catch (e) {
        alert("שגיאת תקשורת");
    }
}

        async function deleteEntry(rowId) {
            if(!confirm("Are you sure?")) return;
            const res = await apiRequestJSONP('deleteEntry', { userId: currentUser.userId, rowId: rowId });
            if(res?.success) {
                showToast("Deleted");
                loadReport();
            } else showToast("Delete failed", "error");
        }


        function logout() { location.reload(); }
    </script>
</body>
</html>
