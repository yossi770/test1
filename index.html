<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kollel Tracker - Fast Load</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(229, 231, 235, 0.5); }
        body { background-color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="loginSection" class="w-full max-w-md mt-10 p-8 glass-card rounded-2xl shadow-xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Kollel Tracker</h1>
            <p class="text-slate-500 mt-2">כניסה מהירה דרך GitHub</p>
        </div>
        <div class="space-y-4">
            <input type="number" id="userIdInput" placeholder="מספר מזהה (למשל 101)"
                   class="w-full p-4 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-lg text-center">
            <button onclick="handleLogin()" id="loginBtn"
                    class="w-full bg-slate-800 text-white p-4 rounded-xl font-bold text-lg hover:bg-slate-700 transition-all flex justify-center items-center gap-2">
                <i data-lucide="log-in"></i> כניסה
            </button>
        </div>
    </div>

    <div id="dashboardSection" class="w-full max-w-md space-y-6 hidden">
        <div class="flex justify-between items-center p-2">
            <div>
                <h2 class="text-xl font-bold text-slate-800">שלום, <span id="userNameDisplay">---</span></h2>
                <p id="currentDate" class="text-sm text-slate-500"></p>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-red-500">
                <i data-lucide="log-out"></i>
            </button>
        </div>

        <div class="glass-card p-8 rounded-3xl shadow-lg text-center space-y-6">
            <div id="statusIndicator" class="inline-flex items-center gap-2 px-4 py-1 rounded-full text-sm font-medium bg-slate-100 text-slate-600">
                <span class="w-2 h-2 rounded-full bg-slate-400"></span> Offline
            </div>
            <div class="text-5xl font-mono font-bold text-slate-800 py-4" id="timerDisplay">00:00:00</div>
            <div class="flex gap-4">
                <button id="startBtn" onclick="handleStart(event)" class="flex-1 bg-emerald-600 text-white p-5 rounded-2xl font-bold shadow-lg hover:bg-emerald-700 active:scale-95 transition-all">START</button>
                <button id="endBtn" onclick="handleEnd(event)" disabled class="flex-1 bg-rose-600 text-white p-5 rounded-2xl font-bold shadow-lg hover:bg-rose-700 active:scale-95 transition-all disabled:opacity-30">STOP</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center">
            <span class="text-slate-600 font-medium">סה"כ שעות החודש:</span>
            <span id="monthlyHours" class="text-xl font-bold text-slate-800">0.00</span>
        </div>
    </div>

    <script>
        // --- הגדרות תקשורת JSONP ---
        const GOOGLE_SCRIPT_URL = "הדבק_כאן_את_הקישור_שמסתיים_ב_exec";

        function apiRequestJSONP(action, payload) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_' + Math.round(Math.random() * 1000000);
                
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    const scriptTag = document.getElementById(callbackName);
                    if (scriptTag) document.body.removeChild(scriptTag);
                    resolve(data);
                };

                const url = `${GOOGLE_SCRIPT_URL}?callback=${callbackName}&action=${action}&payload=${encodeURIComponent(JSON.stringify(payload))}`;
                const script = document.createElement('script');
                script.id = callbackName;
                script.src = url;
                script.onerror = () => reject(new Error('שגיאת תקשורת (JSONP)'));
                document.body.appendChild(script);
            });
        }

        // --- לוגיקה של האפליקציה ---
        lucide.createIcons();
        let currentUser = null;
        let timerInterval = null;
        let startTime = null;
        let isProcessing = false;

        async function handleLogin() {
            const userId = document.getElementById('userIdInput').value;
            if(!userId) return alert("נא להזין מספר מזהה");
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = "מתחבר...";

            try {
                const res = await apiRequestJSONP('getUser', { userId: userId });
                if(res && res.userName) {
                    currentUser = res;
                    showDashboard();
                } else {
                    alert("משתמש לא נמצא במערכת");
                    btn.disabled = false;
                    btn.innerHTML = "כניסה";
                }
            } catch (e) {
                alert("לא ניתן להתחבר לשרת גוגל. וודא שהקישור תקין.");
                btn.disabled = false;
                btn.innerHTML = "כניסה";
            }
        }

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = currentUser.userName;
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long' });
            if (currentUser.monthlyHours) document.getElementById('monthlyHours').innerText = currentUser.monthlyHours;
        }

        async function handleStart(event) {
            if(event) event.preventDefault();
            updateUI(true);
            startTimer(new Date());
            await apiRequestJSONP('startSession', { userId: currentUser.userId });
        }

        async function handleEnd(event) {
            if(event) event.preventDefault();
            if(isProcessing) return;
            isProcessing = true;

            clearInterval(timerInterval);
            document.getElementById('timerDisplay').innerText = "00:00:00";
            updateUI(false);

            try {
                const res = await apiRequestJSONP('endSession', { userId: currentUser.userId });
                if(res && res.duration) alert("הסשן נסגר: " + res.duration + " דקות.");
            } catch (e) {
                console.error("סנכרון נכשל");
            } finally {
                isProcessing = false;
            }
        }

        function startTimer(time) {
            startTime = time;
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = new Date() - startTime;
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function updateUI(isActive) {
            const startBtn = document.getElementById('startBtn');
            const endBtn = document.getElementById('endBtn');
            const status = document.getElementById('statusIndicator');
            
            if(isActive) {
                startBtn.disabled = true;
                endBtn.disabled = false;
                status.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Active Now';
                status.className = "inline-flex items-center gap-2 px-4 py-1 rounded-full text-sm font-medium bg-emerald-50 text-emerald-600";
            } else {
                startBtn.disabled = false;
                endBtn.disabled = true;
                status.innerHTML = '<span class="w-2 h-2 rounded-full bg-slate-400"></span> Offline';
                status.className = "inline-flex items-center gap-2 px-4 py-1 rounded-full text-sm font-medium bg-slate-100 text-slate-600";
            }
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
